name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_CI }}
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET_CI }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET_CI }}
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: API integration tests
        run: npm run test:api
        timeout-minutes: 5
